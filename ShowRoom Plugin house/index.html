<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plugin House Showroom</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="container header-container">
      <h1 class="logo">Plugin House</h1>

      <!-- NAVIGATION -->
      <nav aria-label="Navigazione principale">
        <button class="hamburger" aria-label="Apri menu">
          ☰
        </button>

        <ul class="nav-links">
          <li><a href="#home">Home</a></li>
          <li><a href="#catalogo">Catalogo</a></li>
          <li><a href="#preferiti">Preferiti</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- HOME SECTION -->
    <section id="home" class="hero">
      <div class="container">
        <h1>Scopri i migliori plugin per la tua produzione</h1>
        <p>Tutti i plugin più famosi raccolti in un unico posto.</p>
        <a href="#catalogo" class="btn-primary">Esplora ora</a>
      </div>
    </section>

    <!-- CATALOGO SECTION -->
    <section id="catalogo" class="catalogo">
      <div class="container">

        <h2>Catalogo Plugin</h2>

        <!-- FILTRI -->
        <div class="filters">

          <!-- BARRA DI RICERCA -->
          <div class="search-box">
            <label for="search">Cerca plugin</label>
            <input 
              type="text" 
              id="search" 
              name="search" 
              placeholder="Es. Serum"
              aria-label="Cerca plugin per nome"
            >
          </div>

          <!-- ORDINAMENTO -->
          <div class="sort-box">
            <label for="sort">Ordina per</label>
            <select id="sort" name="sort">
              <option value="default">Default</option>
              <option value="price-asc">Prezzo crescente</option>
              <option value="price-desc">Prezzo decrescente</option>
              <option value="name">Nome A-Z</option>
            </select>
          </div>

        </div>

        <!-- GRIGLIA PRODOTTI -->
        <div id="products-grid" class="products-grid">
          <!-- Le card saranno generate dinamicamente da JS -->
        </div>

      </div>
    </section>

    <!-- SEZIONE PREFERITI -->
    <section id="preferiti" class="preferiti">
      <div class="container">
        <h2>I tuoi Preferiti</h2>
        <div id="favorites-grid" class="products-grid">
          <!-- Preferiti generati via JS -->
        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <p>© 2026 Plugin House Showroom</p>
      <p>Progetto scolastico front-end</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
